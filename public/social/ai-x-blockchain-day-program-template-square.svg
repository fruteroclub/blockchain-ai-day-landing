      }
      @font-face {
        font-family: "JetBrains Mono Variable";
        src: url("../print/fonts/jetbrains-mono-latin-wght-normal.woff2") format("woff2");
        font-weight: 300 800;
      }
      .display { font-family: "Space Grotesk Variable", "Space Grotesk", Arial, sans-serif; }
