      <stop offset="0" stop-color="#5FE3DA" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#34C9C0" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#34C9C0" stop-opacity="0"/>
